<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROLEX | نظام الاستثمار المتكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: #070b14; color: white; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .gold-card { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); color: #1a1a1a; }
        input { text-align: center; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <main id="app" class="flex-grow flex items-center justify-center p-4">
        </main>

    <nav id="bottomNav" class="hidden fixed bottom-0 w-full glass border-t border-white/5 p-4 flex justify-around items-center z-50">
        <div onclick="showDashboard()" class="text-center cursor-pointer">
            <span class="block text-xl">🏠</span>
            <span class="text-[10px] font-bold">الرئيسية</span>
        </div>
        <div onclick="showDeposit()" class="text-center cursor-pointer">
            <span class="block text-xl">💰</span>
            <span class="text-[10px] font-bold">إيداع</span>
        </div>
        <div onclick="showWithdraw()" class="text-center cursor-pointer">
            <span class="block text-xl">💳</span>
            <span class="text-[10px] font-bold">سحب</span>
        </div>
        <div onclick="showProfile()" class="text-center cursor-pointer">
            <span class="block text-xl">👤</span>
            <span class="text-[10px] font-bold">حسابي</span>
        </div>
    </nav>

    <script>
        const SUPABASE_URL = "https://rsmrgiyecaoicrqxgize.supabase.co";
        const SUPABASE_KEY = "EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzbXJnaXllY2FvaWNycXhnaXplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTEzODgsImV4cCI6MjA5MDQ2NzM4OH0.9YafUeTgpnqWNsjokIwzHmM-nEkDH81271t2rdk_2UQ";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let user = null;

        // --- 1. صفحة الدخول ---
        function showLogin() {
            document.getElementById('bottomNav').classList.add('hidden');
            document.getElementById('app').innerHTML = `
                <div class="w-full max-w-md glass p-10 rounded-[2.5rem] shadow-2xl text-center">
                    <h1 class="text-5xl font-black text-blue-500 italic mb-10 tracking-tighter">ROLEX</h1>
                    <div class="space-y-4">
                        <input type="email" id="email" placeholder="البريد الإلكتروني" class="w-full p-4 rounded-2xl bg-slate-900 border border-white/5 outline-none focus:border-blue-500 font-bold">
                        <input type="password" id="pass" placeholder="كلمة المرور" class="w-full p-4 rounded-2xl bg-slate-900 border border-white/5 outline-none focus:border-blue-500 font-bold">
                        <button onclick="handleLogin()" id="mainBtn" class="w-full bg-blue-600 p-4 rounded-2xl font-black text-lg">دخول 🚀</button>
                        <button onclick="showRegister()" class="text-gray-500 text-sm font-bold underline">ليس لديك حساب؟ سجل الآن</button>
                    </div>
                </div>
            `;
        }

        // --- 2. صفحة التسجيل (الجديدة) ---
        function showRegister() {
            document.getElementById('app').innerHTML = `
                <div class="w-full max-w-md glass p-10 rounded-[2.5rem] shadow-2xl text-center">
                    <h2 class="text-2xl font-black mb-6 text-white">إنشاء حساب جديد ✨</h2>
                    <div class="space-y-4">
                        <input type="text" id="regUser" placeholder="اسم المستخدم" class="w-full p-4 rounded-2xl bg-slate-900 border border-white/5 outline-none focus:border-blue-500 font-bold">
                        <input type="email" id="regEmail" placeholder="البريد الإلكتروني" class="w-full p-4 rounded-2xl bg-slate-900 border border-white/5 outline-none focus:border-blue-500 font-bold">
                        <input type="password" id="regPass" placeholder="كلمة المرور" class="w-full p-4 rounded-2xl bg-slate-900 border border-white/5 outline-none focus:border-blue-500 font-bold">
                        <button onclick="handleRegister()" id="regBtn" class="w-full bg-green-600 p-4 rounded-2xl font-black text-lg">تأكيد التسجيل ✅</button>
                        <button onclick="showLogin()" class="text-gray-500 text-sm font-bold underline">لديك حساب؟ سجل دخولك</button>
                    </div>
                </div>
            `;
        }

        // --- منطق التسجيل ---
        async function handleRegister() {
            const username = document.getElementById('regUser').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPass').value.trim();
            const btn = document.getElementById('regBtn');

            if (!username || !email || !password) return alert("يرجى ملء جميع الخانات!");

            btn.innerText = "جاري الحفظ...";
            btn.disabled = true;

            const { data, error } = await _supabase
                .from('profiles')
                .insert([{ username, email, password, balance: 0 }])
                .select()
                .single();

            if (error) {
                alert("خطأ: قد يكون الإيميل مستخدماً بالفعل!");
                btn.innerText = "تأكيد التسجيل ✅";
                btn.disabled = false;
            } else {
                alert("تم إنشاء حسابك بنجاح!");
                user = data;
                showDashboard();
            }
        }

        // --- منطق الدخول ---
        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('pass').value.trim();
            const btn = document.getElementById('mainBtn');

            btn.innerText = "جاري التحقق...";
            const { data, error } = await _supabase.from('profiles').select('*').eq('email', email).eq('password', pass).maybeSingle();

            if (data) {
                user = data;
                showDashboard();
            } else {
                alert("خطأ في البيانات!");
                btn.innerText = "دخول 🚀";
            }
        }

        // باقي الصفحات (Dashboard, Deposit, إلخ كما في الكود السابق)
        function showDashboard() {
            document.getElementById('bottomNav').classList.remove('hidden');
            document.getElementById('app').innerHTML = `
                <div class="w-full max-w-md space-y-6 pb-24 self-start mt-10 text-center">
                    <div class="gold-card p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden text-right">
                        <p class="font-black opacity-70">إجمالي الرصيد</p>
                        <h2 class="text-5xl font-black mt-2 tabular-nums">$${user.balance}</h2>
                    </div>
                    <p class="font-bold text-blue-400">مرحباً بك ${user.username} في Rolex</p>
                </div>
            `;
        }

        showLogin();
    </script>
</body>
</html>
